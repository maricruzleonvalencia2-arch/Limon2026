<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lemonx</title>
<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1f1c2c);
  background-size: 400% 400%;
  animation: gradient 15s ease infinite;
  font-family: Arial, sans-serif;
}

@keyframes gradient {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.container {
  text-align:center;
  width:600px;
}

.logo {
  font-size:48px;
  color:white;
  margin-bottom:30px;
  letter-spacing:3px;
}

input {
  width:80%;
  padding:15px;
  border-radius:40px;
  border:none;
  outline:none;
  font-size:16px;
  transition:0.3s;
}

input:focus {
  box-shadow:0 0 20px #00ffe7;
}

button {
  margin-top:20px;
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background:#00ffe7;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
}

button:hover {
  background:white;
}

.card {
  margin-top:30px;
  background: rgba(255,255,255,0.1);
  padding:20px;
  border-radius:20px;
  color:white;
  display:none;
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">Lemonx</div>
  <input type="text" id="query" placeholder="¿Qué proyecto quieres simular?">
  <br>
  <button onclick="simulate()">Simular decisión</button>

  <div class="card" id="result"></div>
</div>

<script>
function simulate(){
  const text = document.getElementById("query").value;
  const result = document.getElementById("result");

  if(text.trim() === ""){
    alert("Describe tu idea primero 🍋");
    return;
  }

  const inversion = Math.floor(Math.random()*50000 + 5000);
  const retorno = Math.floor(Math.random()*18 + 3);
  const riesgo_val = Math.random();

  let riesgo = "Bajo";
  if(riesgo_val > 0.6) riesgo = "Alto";
  else if(riesgo_val > 0.3) riesgo = "Medio";

  const score = Math.floor((1-riesgo_val)*100);

  result.innerHTML = `
    <h3>Simulación para: ${text}</h3>
    <p>💰 Inversión estimada: $${inversion}</p>
    <p>⏳ Retorno estimado: ${retorno} meses</p>
    <p>⚠ Nivel de riesgo: ${riesgo}</p>
    <p>📊 Probabilidad de éxito: ${score}%</p>
    <p>🍋 Recomendación: ${score > 60 ? "Proyecto viable si ejecutas con estrategia." : "Requiere validación antes de invertir fuerte."}</p>
  `;

  result.style.display = "block";
}
</script>

</body>
</html>
