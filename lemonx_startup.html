<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lemonx</title>
<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1f1c2c);
  background-size: 400% 400%;
  animation: gradient 15s ease infinite;
  font-family: Arial, sans-serif;
}

@keyframes gradient {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.container {
  text-align:center;
}

.logo {
  font-size:48px;
  color:white;
  margin-bottom:30px;
  letter-spacing:3px;
}

input {
  width:400px;
  padding:15px;
  border-radius:40px;
  border:none;
  outline:none;
  font-size:16px;
  transition:0.3s;
}

input:focus {
  box-shadow:0 0 20px #00ffe7;
}

button {
  margin-top:20px;
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background:#00ffe7;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
}

button:hover {
  background:white;
}

.result {
  margin-top:30px;
  color:white;
  font-size:18px;
  opacity:0;
  transition:1s;
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">Lemonx</div>
  <input type="text" id="query" placeholder="¿Qué quieres lograr realmente?">
  <br>
  <button onclick="simulate()">Simular</button>
  <div class="result" id="result"></div>
</div>

<script>
function simulate(){
  const text = document.getElementById("query").value;
  const result = document.getElementById("result");

  if(text.trim() === ""){
    result.innerHTML = "Lemonx detecta silencio…";
  } else {
    result.innerHTML = "Analizando intención profunda sobre: " + text + " ✨";
  }

  result.style.opacity = 1;
}
</script>

</body>
</html>
