<!DOCTYPE html>
<html>
<head>
    <title>Limón2026 - Buscador Avanzado</title>
    <meta charset="UTF-8">
    <style>
        body { text-align:center; font-family: Arial; margin-top:50px; }
        input[type="text"] { width: 300px; height: 35px; font-size:18px; }
        button { height: 35px; font-size:16px; cursor:pointer; }
        .results { margin-top:30px; text-align:left; max-width:600px; margin-left:auto; margin-right:auto; }
        .result { margin-bottom:20px; }
        .result a { font-size:18px; color:blue; text-decoration:none; }
        .result a:hover { text-decoration:underline; }
        .result p { font-size:14px; color:#555; }
        .suggestion { font-size:16px; color:green; margin-bottom:15px; }
    </style>
</head>
<body>

<h1>Limón2026</h1>

<input id="searchInput" type="text" placeholder="Buscar...">
<button onclick="search()">Buscar</button>

<div class="results" id="results"></div>

<script>
const exampleData = [
    { title: "Cómo vender más", url: "https://www.entrepreneur.com/article/321347", desc: "Consejos prácticos para mejorar ventas." },
    { title: "Aprender a programar gratis", url: "https://www.freecodecamp.org/", desc: "Tutoriales completos de programación." },
    { title: "Ideas para negocios", url: "https://www.businessnewsdaily.com/", desc: "Inspiración para emprendedores." },
    { title: "Marketing digital", url: "https://www.hubspot.com/resources", desc: "Guías y recursos de marketing." },
    { title: "Administración de tiempo", url: "https://www.mindtools.com/pages/main/newMN_HTE.htm", desc: "Aprende a organizar tu día y ser productivo." }
];

// Función para buscar dentro de exampleData
function search() {
    const query = document.getElementById("searchInput").value.trim().toLowerCase();
    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    if (!query) return;

    // Filtra resultados que contengan la palabra clave
    let filtered = exampleData.filter(item => item.title.toLowerCase().includes(query) || item.desc.toLowerCase().includes(query));

    // Si no hay resultados exactos, sugiere el más cercano
    if (filtered.length === 0) {
        let suggestion = exampleData.find(item => {
            let words = item.title.toLowerCase().split(" ");
            return words.some(word => query.includes(word) || word.includes(query));
        });
        if (suggestion) {
            let div = document.createElement("div");
            div.className = "suggestion";
            div.innerText = `¿Quizás quisiste decir: "${suggestion.title}"?`;
            resultsDiv.appendChild(div);
            filtered = [suggestion];
        }
    }

    // Muestra los resultados
    filtered.forEach(item => {
        const div = document.createElement("div");
        div.className = "result";
        div.innerHTML = `<a href="${item.url}" target="_blank">${item.title}</a><p>${item.desc}</p>`;
        resultsDiv.appendChild(div);
    });
}
</script>

</body>
</html>
