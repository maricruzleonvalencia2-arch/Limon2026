<!DOCTYPE html>
<html>
<head>
    <title>Limón2026 - Buscador</title>
    <meta charset="UTF-8">
    <style>
        body { text-align: center; font-family: Arial; margin-top: 100px; }
        input[type="text"] { width: 300px; height: 35px; font-size: 18px; }
        button { height: 35px; font-size: 16px; cursor: pointer; }
        .results { margin-top: 30px; text-align: left; max-width: 600px; margin-left: auto; margin-right: auto; }
        .result { margin-bottom: 20px; }
        .result a { font-size: 18px; color: blue; text-decoration: none; }
        .result a:hover { text-decoration: underline; }
        .result p { font-size: 14px; color: #555; }
    </style>
</head>

<body>
    <h1>Limón2026</h1>
    <input id="searchInput" type="text" placeholder="Buscar...">
    <button onclick="search()">Buscar</button>

    <div class="results" id="results"></div>

    <script>
        function search() {
            const query = document.getElementById("searchInput").value;
            if (!query) return;

            // Limpiar resultados previos
            const resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = "";

            // URL de búsqueda en DuckDuckGo
            const url = `https://duckduckgo.com/html/?q=${encodeURIComponent(query)}`;

            // Mostrar los resultados en un iframe (gratis y seguro)
            const iframe = document.createElement("iframe");
            iframe.src = url;
            iframe.style.width = "100%";
            iframe.style.height = "600px";
            iframe.style.border = "none";
            resultsDiv.appendChild(iframe);
        }
    </script>
</body>
</html>
